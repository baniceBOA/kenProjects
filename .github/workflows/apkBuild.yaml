# This workflow builds an Android APK using Buildozer on push and pull request events to the main branch.
# https://github.com/baniceBOA/kenProjects

name: Android Build
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # Allows you to manually click "Run" in the Actions tab

jobs:
  build:
    runs-on: ubuntu-22.04  # Fixes the 'waiting for runner' issue
    steps:
      - uses: actions/checkout@v4

      # Manually install the missing legacy library for Ubuntu 24.04 compatibility
      - name: Install legacy libtinfo5
        run: |
          sudo apt update
          wget http://security.ubuntu.com/ubuntu/pool/universe/n/ncurses/libtinfo5_6.3-2ubuntu0.1_amd64.deb
          sudo apt install ./libtinfo5_6.3-2ubuntu0.1_amd64.deb
      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt-get install -y libtool pkg-config autoconf automake

      - name: Build with Buildozer
        uses: digreatbrian/buildozer-action@v2
        with:
          buildozer_cmd: buildozer android debug
          python_version: '3.11'

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Projectile-Motion-APK
          path: bin/*.apk

    
