# This workflow builds an Android APK using Buildozer on push and pull request events to the main branch.
# https://github.com/baniceBOA/kenProjects

name: Android Build
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # Allows you to manually click "Run" in the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest  # Fixes the 'waiting for runner' issue
    steps:
      - uses: actions/checkout@v4

      - name: Build with Buildozer
        uses: digreatbrian/buildozer-action@v2
        with:
          # This handles all the apt-get installs and SDK/NDK setup for you
          buildozer_cmd: buildozer android debug
          python_version: '3.11'

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Projectile-Motion-APK
          path: bin/*.apk
